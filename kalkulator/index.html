        <!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalkulator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

  <div class="bg-white shadow-2xl rounded-2xl p-6 w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Oddiy Kalkulator</h2>

    <div class="space-y-4">
      <input id="num1" type="number" placeholder="Birinchi son"
        class="w-full p-3 border rounded-lg" />

      <select id="operator" class="w-full p-3 border rounded-lg">
        <option value="+">Qo'shish (+)</option>
        <option value="-">Ayirish (-)</option>
        <option value="*">Ko'paytirish (*)</option>
        <option value="/">Bo'lish (/)</option>
      </select>

      <input id="num2" type="number" placeholder="Ikkinchi son"
        class="w-full p-3 border rounded-lg" />

      <button id="calculateBtn"
        class="w-full bg-blue-500 text-white p-3 rounded-lg hover:bg-blue-600 font-semibold">
        Hisoblash
      </button>

      <div id="result" class="text-xl font-bold text-center mt-4"></div>
    </div>
  </div>

  <script>
    const num1 = document.getElementById('num1');
    const num2 = document.getElementById('num2');
    const operator = document.getElementById('operator');
    const resultDiv = document.getElementById('result');
    const calculateBtn = document.getElementById('calculateBtn');

    calculateBtn.addEventListener('click', function () {
      const value1 = parseFloat(num1.value);
      const value2 = parseFloat(num2.value);
      const op = operator.value;

      if (isNaN(value1) || isNaN(value2)) {
        resultDiv.textContent = 'Iltimos son kiriting';
        return;
      }

      let result;

      switch (op) {
        case '+':
          result = value1 + value2;
          break;
        case '-':
          result = value1 - value2;
          break;
        case '*':
          result = value1 * value2;
          break;
        case '/':
          result = value2 !== 0 ? value1 / value2 : '0 ga bo\'lib bo\'lmaydi';
          break;
        default:
          result = 'Xato';
      }

      resultDiv.textContent = 'Natija: ' + result;
    });
  </script>

</body>
</html>
