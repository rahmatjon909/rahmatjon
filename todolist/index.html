<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

  <div class="bg-white shadow-2xl rounded-2xl p-6 w-full max-w-md">
    <h2 class="text-2xl font-bold mb-4 text-center">Todo List</h2>
    
    <div class="flex gap-2 mb-4">
      <input id="todo-input" type="text" placeholder="Vazifa kiriting..."
        class="flex-1 p-2 border rounded-lg" />
      <button onclick="addTask()" class="bg-blue-500 text-white px-4 rounded-lg">Qo'shish</button>
    </div>

    <ul id="todo-list" class="space-y-2"></ul>
  </div>

  <script>
    function addTask() {
      const input = document.getElementById('todo-input');
      const taskText = input.value.trim();
      if (taskText === '') return;

      const li = document.createElement('li');
      li.className = "flex justify-between items-center bg-gray-100 p-2 rounded-lg";

      const span = document.createElement('span');
      span.textContent = taskText;
      span.onclick = () => span.classList.toggle('line-through');

      const deleteBtn = document.createElement('button');
      deleteBtn.textContent = "O'chirish";
      deleteBtn.className = "text-red-500";
      deleteBtn.onclick = () => li.remove();

      li.appendChild(span);
      li.appendChild(deleteBtn);

      document.getElementById('todo-list').appendChild(li);
      input.value = '';
    }
  </script>

</body>
</html>
